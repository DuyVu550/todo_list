# ==========================================
# 🤖 AI / PROJECT GUIDELINES
# ==========================================
# 1. DỰ ÁN NÀY LÀM GÌ:
#    - Ứng dụng Todo List (Quản lý công việc cá nhân).
#    - Hoạt động offline, không có backend.
#
# 2. CẤU TRÚC THƯ MỤC CHÍNH (Feature-first):
#    - lib/core/: Chứa cấu hình dùng chung toàn dự án (database, theme, utils).
#    - lib/features/: Chứa các tính năng tách biệt (task_list, tags, settings,...).
#        - data/: Chứa Models và Data Sources/Repositories.
#        - presentation/: Chứa Giao diện (screens, widgets) và State (providers).
#
# 3. TECH STACK ĐANG DÙNG:
#    - Framework: Flutter.
#    - State Management: Riverpod (Khuyến khích dùng StreamNotifier/AsyncNotifier).
#    - Database: Isar (NoSQL Offline Database).
#
# 4. NHỮNG FILE/MODULE CẦN CHÚ Ý:
#    - lib/core/database/isar_provider.dart: Khởi tạo và cung cấp Isar instance.
#    - lib/features/task_list/data/models/task_model.dart: Định nghĩa bảng (Collection) công việc.
#    - lib/features/task_list/presentation/providers/task_list_notifier.dart: Nơi chứa toàn bộ logic xử lý, lắng nghe thay đổi DB để báo cho UI.
#
# 5. QUY ƯỚC CODE, NAMING, DATABASE:
#    - Naming convention: Class dùng PascalCase, biến/hàm dùng camelCase, tên file dùng snake_case.
#    - Database: KHÔNG gọi Isar trực tiếp từ màn hình UI. Mọi thao tác phải thông qua các Notifier (Provider) trong thư mục `presentation/providers`.
#    - Reactive Data: Luôn dùng tính năng `watch(fireImmediately: true)` của Isar kết hợp với StreamNotifierProvider để UI tự cập nhật realtime khi Database thay đổi, KHÔNG viết logic load lại dữ liệu (setState).
#    - Code Generation: SAU KHI sửa bất kỳ file Model (`@collection`) nào, BẮT BUỘC chạy lệnh: `dart run build_runner build -d`.
# ==========================================

